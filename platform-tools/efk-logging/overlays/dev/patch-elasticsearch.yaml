apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: elasticsearch
  namespace: logging
spec:
  values:
    replicas: 1
    minimumMasterNodes: 1

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    volumeClaimTemplate:
      resources:
        requests:
          storage: 10Gi

    esJavaOpts: "-Xmx512m -Xms512m"
