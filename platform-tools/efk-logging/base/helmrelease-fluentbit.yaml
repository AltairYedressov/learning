apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit
  namespace: logging
spec:
  interval: 10m
  timeout: 5m

  chart:
    spec:
      chart: fluent-bit
      version: "0.47.10"
      sourceRef:
        kind: HelmRepository
        name: fluent
        namespace: flux-system

  install:
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback

  values:
    kind: DaemonSet

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    tolerations:
      - operator: Exists

    config:
      service: |
        [SERVICE]
            Daemon        Off
            Flush         5
            Log_Level     info
            Parsers_File  /fluent-bit/etc/parsers.conf
            HTTP_Server   On
            HTTP_Listen   0.0.0.0
            HTTP_Port     2020
            Health_Check  On

      inputs: |
        [INPUT]
            Name              tail
            Tag               kube.*
            Path              /var/log/containers/*.log
            Parser            cri
            Mem_Buf_Limit     5MB
            Skip_Long_Lines   On
            Refresh_Interval  10

      filters: |
        [FILTER]
            Name                kubernetes
            Match               kube.*
            Kube_URL            https://kubernetes.default.svc:443
            Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
            Kube_Tag_Prefix     kube.var.log.containers.
            Merge_Log           On
            Merge_Log_Key       log_processed
            Keep_Log            Off
            K8S-Logging.Parser  On
            K8S-Logging.Exclude On
            Labels              On
            Annotations         Off

        [FILTER]
            Name    modify
            Match   kube.*
            Remove  stream
            Remove  _p

      outputs: |
        [OUTPUT]
            Name            es
            Match           kube.*
            Host            elasticsearch-master
            Port            9200
            Logstash_Format On
            Logstash_Prefix k8s-logs
            Retry_Limit     3
            Replace_Dots    On
            Suppress_Type_Name On
            tls             Off

    serviceMonitor:
      enabled: true
      namespace: logging
      selector:
        release: kube-prometheus-stack
