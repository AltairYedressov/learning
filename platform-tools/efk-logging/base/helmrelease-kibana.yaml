apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kibana
  namespace: logging
spec:
  interval: 10m
  timeout: 10m

  chart:
    spec:
      chart: kibana
      version: "8.5.1"
      sourceRef:
        kind: HelmRepository
        name: elastic
        namespace: flux-system

  install:
    disableHooks: true
    remediation:
      retries: 3

  upgrade:
    disableHooks: true
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback

  values:
    replicas: 1

    protocol: http
    createCert: false

    elasticsearchHosts: "http://elasticsearch-master:9200"

    # Chart requires a cert secret even when security is disabled —
    # uses a dummy secret with empty values (created by SealedSecret or manually)
    elasticsearchCertificateSecret: elasticsearch-master-certs
    secretMounts: []

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    healthCheckPath: "/app/kibana"

    podSecurityContext:
      runAsUser: 1000
      runAsNonRoot: true
      fsGroup: 1000

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL

    extraVolumes:
      - name: tmp
        emptyDir:
          sizeLimit: 100Mi

    extraVolumeMounts:
      - name: tmp
        mountPath: /tmp

    service:
      type: ClusterIP
      port: 5601

    kibanaConfig:
      kibana.yml: |
        server.host: "0.0.0.0"
        elasticsearch.hosts: ["http://elasticsearch-master:9200"]
        server.shutdownTimeout: "5s"
        xpack.encryptedSavedObjects.encryptionKey: "min-32-char-long-encryption-key!!"
