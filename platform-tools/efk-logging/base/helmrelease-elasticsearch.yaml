apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: elasticsearch
  namespace: logging
spec:
  interval: 10m
  timeout: 15m

  chart:
    spec:
      chart: elasticsearch
      version: "8.5.1"
      sourceRef:
        kind: HelmRepository
        name: elastic
        namespace: flux-system

  install:
    crds: Create
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback

  values:
    replicas: 2

    minimumMasterNodes: 1

    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

    volumeClaimTemplate:
      accessModes: ["ReadWriteOnce"]
      storageClassName: gp2
      resources:
        requests:
          storage: 30Gi

    esJavaOpts: "-Xmx1g -Xms1g"

    clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"

    protocol: http

    # Disable TLS/security — createCert: false prevents the chart from
    # generating certs and injecting SSL env vars
    createCert: false

    secret:
      enabled: false
      password: ""

    # Readiness probe requires ELASTIC_PASSWORD to be set even when
    # security is disabled — it exits 1 if the var is empty
    extraEnvs:
      - name: ELASTIC_PASSWORD
        value: "disabled"

    esConfig:
      elasticsearch.yml: |
        xpack.security.enabled: false
        xpack.security.enrollment.enabled: false
        xpack.security.http.ssl.enabled: false
        xpack.security.transport.ssl.enabled: false

    podSecurityContext:
      runAsUser: 1000
      runAsNonRoot: true
      fsGroup: 1000

    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      capabilities:
        drop:
          - ALL

    extraVolumes:
      - name: tmp
        emptyDir:
          sizeLimit: 100Mi

    extraVolumeMounts:
      - name: tmp
        mountPath: /tmp

    antiAffinity: soft

    service:
      type: ClusterIP
      httpPortName: http
      transportPortName: transport

    lifecycle:
      preStop:
        exec:
          command: ["/bin/sh", "-c", "sleep 20"]
