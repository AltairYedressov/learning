apiVersion: v1
kind: Namespace
metadata:
  name: logging
  labels:
    app.kubernetes.io/managed-by: flux
    # Logging requires privileged access:
    #   - Fluent Bit mounts hostPath volumes (/var/log) to read container logs
    #   - Elasticsearch runs a privileged init container to set vm.max_map_count
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/warn-version: latest
