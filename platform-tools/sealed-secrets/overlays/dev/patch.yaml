apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: sealed-secrets
spec:
  values:
    replicaCount: 1

    podDisruptionBudget:
      enabled: false

    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

    metrics:
      serviceMonitor:
        enabled: false

    networkPolicy:
      enabled: false

    logLevel: debug

    priorityClassName: ""
