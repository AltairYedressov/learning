apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  values:
    admissionController:
      replicas: 1
      podDisruptionBudget:
        enabled: false
      serviceMonitor:
        enabled: false
      container:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 256Mi

    backgroundController:
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          memory: 64Mi

    cleanupController:
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          memory: 64Mi

    reportsController:
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          memory: 64Mi
