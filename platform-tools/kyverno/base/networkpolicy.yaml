# Default-deny all ingress/egress to the admission controller pod,
# then allow only what it strictly needs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kyverno-admission-controller
  namespace: kyverno
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
      app.kubernetes.io/instance: kyverno
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # API server sends AdmissionReview requests on port 9443
    - ports:
        - protocol: TCP
          port: 9443
    # Prometheus scraping on metrics port 8000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # API server access (read policies, write reports)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
