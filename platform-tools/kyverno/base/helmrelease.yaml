---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 1h
  timeout: 5m

  chart:
    spec:
      chart: kyverno
      version: ">=3.0.0 <4.0.0"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 24h

  install:
    crds: Create
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback

  rollback:
    cleanupOnFail: true
    recreate: false
    timeout: 5m

  # -- Values ────────────────────────────────────────────────────────────────
  values:

    # -- Admission Controller ─────────────────────────────────────────────────
    admissionController:
      replicas: 2

      podDisruptionBudget:
        enabled: true
        minAvailable: 1

      container:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 384Mi

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault

      serviceMonitor:
        enabled: true
        namespace: monitoring
        interval: 30s
        labels:
          release: kube-prometheus-stack

    # -- Background Controller ────────────────────────────────────────────────
    backgroundController:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          memory: 128Mi

    # -- Cleanup Controller ───────────────────────────────────────────────────
    cleanupController:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          memory: 128Mi

    # -- Reports Controller ───────────────────────────────────────────────────
    reportsController:
      resources:
        requests:
          cpu: 100m
          memory: 64Mi
        limits:
          memory: 128Mi
