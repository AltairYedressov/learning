---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: istio-system
spec:
  interval: 1h
  timeout: 5m

  chart:
    spec:
      chart: base
      version: ">=1.24.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: istio-release
        namespace: flux-system
      interval: 24h

  install:
    crds: Create
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback

  values:
    defaultRevision: default
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 1h
  timeout: 5m
  dependsOn:
    - name: istio-base

  chart:
    spec:
      chart: istiod
      version: ">=1.24.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: istio-release
        namespace: flux-system
      interval: 24h

  install:
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback

  rollback:
    cleanupOnFail: true
    recreate: false
    timeout: 5m

  values:
    pilot:
      autoscaleEnabled: false
      replicaCount: 2
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    meshConfig:
      accessLogFile: /dev/stdout
      enableAutoMtls: true
      defaultConfig:
        holdApplicationUntilProxyStarts: true

    global:
      proxy:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        logLevel: warning
