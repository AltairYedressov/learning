apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: thanos
  namespace: monitoring
spec:
  interval: 10m
  timeout: 10m

  chart:
    spec:
      chart: thanos
      version: "15.x.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system

  install:
    crds: Create
    remediation:
      retries: 3

  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback

  values:
    existingObjstoreSecret: thanos-objstore-secret

    query:
      enabled: true
      replicaCount: 2
      dnsDiscovery:
        sidecarsService: kube-prometheus-stack-thanos-discovery
        sidecarsNamespace: monitoring
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi

    queryFrontend:
      enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi

    storegateway:
      enabled: true
      replicaCount: 1
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::372517046622:role/thanos-role
      persistence:
        enabled: true
        size: 10Gi
        storageClass: gp2
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

    compactor:
      enabled: true
      serviceAccount:
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::372517046622:role/thanos-role
      persistence:
        enabled: true
        size: 20Gi
        storageClass: gp2
      retentionResolutionRaw: 30d
      retentionResolution5m: 90d
      retentionResolution1h: 365d
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

    ruler:
      enabled: false

    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: monitoring
        labels:
          release: kube-prometheus-stack
