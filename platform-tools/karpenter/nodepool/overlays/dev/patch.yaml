# platform-tools/karpenter/nodepool/overlays/dev/patch.yaml
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]          # dev → spot only
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.medium
            - t3a.medium
            - t3.large
            - t3a.large
  limits:
    cpu: 20
    memory: 80Gi
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  tags:
    Name: karpenter-node
    environment: dev