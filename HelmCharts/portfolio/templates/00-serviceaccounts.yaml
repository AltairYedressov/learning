# ── ServiceAccounts (D-10) ──────────────────────────────────────────────────
# Dedicated identities so Istio mTLS principals are distinct per workload.
# No IRSA annotations — pods do not call AWS APIs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.api | default "portfolio-api" }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: portfolio-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.web | default "portfolio-web" }}
  namespace: {{ .Values.namespace.name }}
  labels:
    app: portfolio-web
