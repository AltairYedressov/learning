# ── Backend Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-api
  namespace: {{ .Values.namespace.name }}
  labels:
    app: portfolio-api
    tier: backend
spec:
  replicas: {{ .Values.replicas.api }}
  selector:
    matchLabels:
      app: portfolio-api
  template:
    metadata:
      labels:
        app: portfolio-api
        tier: backend
    spec:
      serviceAccountName: {{ .Values.serviceAccount.api | default "portfolio-api" }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: {{ .Values.images.api }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.ports.api }}
          envFrom:
            - secretRef:
                name: portfolio-smtp
          env:
            - name: BACKEND_PORT
              value: {{ .Values.ports.api | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.config.allowedOrigins | quote }}
            - name: RATE_LIMIT
              value: {{ .Values.config.rateLimit | quote }}
            - name: RATE_WINDOW_MINUTES
              value: {{ .Values.config.rateWindowMinutes | quote }}
            - name: MAX_BODY_BYTES
              value: {{ .Values.config.maxBodyBytes | quote }}
          resources:
            requests:
              cpu: {{ .Values.resources.api.requests.cpu }}
              memory: {{ .Values.resources.api.requests.memory }}
            limits:
              cpu: {{ .Values.resources.api.limits.cpu }}
              memory: {{ .Values.resources.api.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ports.api }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ports.api }}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
---
# ── Backend Service (ClusterIP — internal only) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: portfolio-api
  namespace: {{ .Values.namespace.name }}
  labels:
    app: portfolio-api
spec:
  type: ClusterIP
  selector:
    app: portfolio-api
  ports:
    - port: {{ .Values.ports.api }}
      targetPort: {{ .Values.ports.api }}
      protocol: TCP
