# ── Backend Deployment ───────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-api
  namespace: {{ .Values.namespace.name }}
  labels:
    app: portfolio-api
    tier: backend
spec:
  replicas: {{ .Values.replicas.api }}
  selector:
    matchLabels:
      app: portfolio-api
  template:
    metadata:
      labels:
        app: portfolio-api
        tier: backend
    spec:
      containers:
        - name: api
          image: {{ .Values.images.api }}
          ports:
            - containerPort: {{ .Values.ports.api }}
          envFrom:
            - secretRef:
                name: portfolio-smtp
          resources:
            requests:
              cpu: {{ .Values.resources.api.requests.cpu }}
              memory: {{ .Values.resources.api.requests.memory }}
            limits:
              cpu: {{ .Values.resources.api.limits.cpu }}
              memory: {{ .Values.resources.api.limits.memory }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.ports.api }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.ports.api }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ── Backend Service (ClusterIP — internal only) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: portfolio-api
  namespace: {{ .Values.namespace.name }}
  labels:
    app: portfolio-api
spec:
  type: ClusterIP
  selector:
    app: portfolio-api
  ports:
    - port: {{ .Values.ports.api }}
      targetPort: {{ .Values.ports.api }}
      protocol: TCP
