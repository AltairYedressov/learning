# ── Frontend Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-frontend
  namespace: {{ .Values.namespace.name }}
  labels:
    app: portfolio-frontend
    tier: frontend
spec:
  replicas: {{ .Values.replicas.frontend }}
  selector:
    matchLabels:
      app: portfolio-frontend
  template:
    metadata:
      labels:
        app: portfolio-frontend
        tier: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: {{ .Values.images.frontend }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.ports.frontend }}
          env:
            - name: API_URL
              value: {{ .Values.api.url }}
            - name: PORT
              value: {{ .Values.ports.frontend | quote }}
          resources:
            requests:
              cpu: {{ .Values.resources.frontend.requests.cpu }}
              memory: {{ .Values.resources.frontend.requests.memory }}
            limits:
              cpu: {{ .Values.resources.frontend.limits.cpu }}
              memory: {{ .Values.resources.frontend.limits.memory }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ports.frontend }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.ports.frontend }}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
---
# ── Frontend Service (ClusterIP — Istio handles ingress) ─────────────────────
apiVersion: v1
kind: Service
metadata:
  name: portfolio-frontend
  namespace: {{ .Values.namespace.name }}
  labels:
    app: portfolio-frontend
spec:
  type: ClusterIP
  selector:
    app: portfolio-frontend
  ports:
    - port: {{ .Values.ports.frontend }}
      targetPort: {{ .Values.ports.frontend }}
      protocol: TCP
