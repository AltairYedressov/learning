name: Portfolio Images - Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'app/portfolio/**'
      - '.github/workflows/portfolio-images.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'app/portfolio/**'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 372517046622.dkr.ecr.us-east-1.amazonaws.com

concurrency:
  group: portfolio-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: portfolio-web
            context: app/portfolio/frontend
          - name: portfolio-api
            context: app/portfolio/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials (OIDC)
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          role-session-name: GitHubActionsPortfolioImages
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push ${{ matrix.image.name }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.image.name }}:latest
            ${{ env.ECR_REGISTRY }}/${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          provenance: false

      - name: Write digest to job summary
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          DIGEST="${{ steps.build.outputs.digest }}"
          SHA="${{ github.sha }}"
          IMAGE="${{ matrix.image.name }}"
          REG="${{ env.ECR_REGISTRY }}"
          {
            echo "### ${IMAGE}"
            echo ""
            echo "- digest: \`${REG}/${IMAGE}@${DIGEST}\`"
            echo "- sha tag: \`${REG}/${IMAGE}:${SHA}\`"
            echo "- latest tag: \`${REG}/${IMAGE}:latest\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
