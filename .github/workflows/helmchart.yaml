name: Publish Helm Chart
on:
  push:
    branches: [main11]
    paths:
      - 'HelmCharts/**'           # only triggers on chart changes

env:
  CHART_DIR: "portfolio"

jobs:
  publish:
    runs-on: ubuntu-22.04
    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Configure AWS credentials via OIDC
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          aws-region: us-east-1

      # 3️⃣ Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4️⃣ Package and push Helm chart to Amazon ECR
      - name: Package and push chart
        working-directory: ./HelmCharts
        run: |
          helm package ${{ env.CHART_DIR }}
          helm push portfolio-*.tgz oci://${{ steps.login-ecr.outputs.registry }}/helm-charts