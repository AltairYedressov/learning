# clusters/dev-projectx/karpenter.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: karpenter
  namespace: flux-system
spec:
  interval: 10m
  path: ./platform-tools/karpenter/overlays/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

---

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: karpenter-nodepool
  namespace: flux-system
spec:
  interval: 10m
  path: ./platform-tools/karpenter/nodepool/overlays/dev  # ← dev overlay
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: karpenter    