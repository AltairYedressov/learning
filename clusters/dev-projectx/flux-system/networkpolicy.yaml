# Default-deny all ingress/egress to Flux controllers,
# then allow only what they strictly need.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flux-controllers
  namespace: flux-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow webhook receivers (notification-controller)
    - ports:
        - protocol: TCP
          port: 9292
    # Allow Prometheus metrics scraping
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # GitHub API, Helm repos, OCI registries (HTTPS to internet)
    - ports:
        - protocol: TCP
          port: 443
    # kube-apiserver
    - ports:
        - protocol: TCP
          port: 6443
    # SSH for Git over SSH (if used)
    - ports:
        - protocol: TCP
          port: 22
