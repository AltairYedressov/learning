apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: thanos
  namespace: flux-system
spec:
  interval: 10m
  path: ./platform-tools/thanos/overlays/dev
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: thanos-query
      namespace: monitoring
  timeout: 5m
  dependsOn:
    - name: monitoring
    - name: sealed-secrets
