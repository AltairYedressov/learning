apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-sealed-secrets
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/production/infrastructure/sealed-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: sealed-secrets
      namespace: sealed-secrets
  timeout: 5m
  # Dependency ordering: this must reconcile before any app kustomization
  # that references SealedSecrets
  dependsOn: []