apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portfolio
  namespace: portfolio
spec:
  interval: 10m
  chart:
    spec:
      chart: portfolio
      version: "0.2.0"
      sourceRef:
        kind: HelmRepository
        name: ecr-charts
        namespace: flux-system
  install:
    remediation:
      retries: 1
  upgrade:
    remediation:
      retries: 1
      remediateLastFailure: true
  values:
    namespace:
      name: portfolio

    replicas:
      api: 2
      web: 2

    images:
      api: 372517046622.dkr.ecr.us-east-1.amazonaws.com/portfolio-api:283c394
      web: 372517046622.dkr.ecr.us-east-1.amazonaws.com/portfolio-web:283c394

    ports:
      api: 5000
      web: 3000

    api:
      url: "http://portfolio-api.portfolio.svc.cluster.local:5000"

    resources:
      api:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
      web:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
